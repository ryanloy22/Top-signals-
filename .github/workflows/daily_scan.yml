name: TradeSignal Daily Scan
on:
schedule:
# Runs at 9:00 AM EST (14:00 UTC) Mon-Fri
- cron: '0 14 * * 1-5'
workflow_dispatch:
jobs:
scan:
runs-on: ubuntu-latest
permissions:
contents: write
steps:
- name: Checkout repo
uses: actions/checkout@v4
- name: Set up Python
uses: actions/setup-python@v5
with:
python-version: '3.11'
- name: Install dependencies
run: pip install yfinance pandas numpy requests
- name: Run scanner
run: python scanner.py
- name: Commit & push results
run: |
git config user.name "TradeSignal Bot"
git config user.email "actions@github.com"
UTC')"
git add scan_results.json
git diff --staged --quiet || git commit -m "Scan results $(date +'%Y-%m-%d %H:%M
git push
